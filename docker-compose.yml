version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_superstore
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: superstore_climate_db

    ports:
      - "3307:3306"

    volumes:
      - type: bind
        source: ./data/database/init.sql
        target: /docker-entrypoint-initdb.d/init.sql